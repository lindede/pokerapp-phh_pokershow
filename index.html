<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      /* H5 / PC：主栏 max-width 居中时两侧与牌桌同色 */
      html,
      body {
        margin: 0;
        min-height: 100%;
        background-color: #0a2e1e;
      }
      #app {
        min-height: 100%;
      }
      html.launch-ls,
      html.launch-ls body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100%;
        background-color: #0a0a0a;
      }
      html.launch-ls .uni-page-head,
      html.launch-ls uni-page-head {
        background-color: #0a0a0a !important;
      }
      html.launch-ls #app {
        width: 100%;
        display: flex;
        justify-content: center;
        background-color: #0a0a0a;
      }
      html.launch-ls uni-page-body,
      html.launch-ls .uni-page-body,
      html.launch-ls uni-page,
      html.launch-ls .uni-page-wrapper {
        background-color: #0a0a0a !important;
      }
    </style>
    <script>
      var coverSupport = 'CSS' in window && typeof CSS.supports === 'function' && (CSS.supports('top: env(a)') ||
        CSS.supports('top: constant(a)'))
      var viewportFit = coverSupport ? ', viewport-fit=cover' : ''
      /** m=rv：540px 竖屏录屏；ls=1：1280px 宽屏 16:9，优先于 rv */
      var rvViewportWidth = 540
      var lsViewportWidth = 1280
      var search = window.location.search || ''
      var hash = window.location.hash || ''
      var hashQ = hash.indexOf('?')
      if (hashQ >= 0) search = hash.slice(hashQ)
      var mMatch = search.match(/[?&]m=([^&]*)/)
      var lsMatch = search.match(/[?&]ls=([^&]*)/)
      var isRv = mMatch && decodeURIComponent(mMatch[1]).trim().toLowerCase() === 'rv'
      var isLs = lsMatch && decodeURIComponent(lsMatch[1]).trim() === '1'
      var viewportWidth = isLs ? String(lsViewportWidth) : (isRv ? String(rvViewportWidth) : 'device-width')
      if (isLs) document.documentElement.classList.add('launch-ls')
      document.write(
        '<meta name="viewport" content="width=' + viewportWidth + ', user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' +
        viewportFit + '" />')
    </script>
    <title>博弈技术学习</title>
    <!--preload-links-->
    <!--app-context-->
  </head>
  <body>
    <div id="app"><!--app-html--></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
